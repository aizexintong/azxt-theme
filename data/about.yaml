# 默认内容（当 content/about.md 不存在时使用）
content: |
  ## 关于我

  你好！我是爱则心痛（azxt），一名热爱技术的全栈开发者。

  ### 我的故事

  从最初接触编程开始，我就被代码的魅力所吸引。在这个由0和1组成的数字世界里，我找到了创造的乐趣和无限的可能性。

  ### 技术方向

  我主要专注于以下技术领域：

  - **前端开发**：JavaScript、HTML5、CSS3、React、Vue
  - **后端开发**：Python、Node.js、Go
  - **移动开发**：Flutter、React Native
  - **新兴技术**：Rust、WebAssembly

  ### 开源贡献

  我相信开源的力量，积极参与开源社区，分享自己的代码和经验。通过开源，我们共同推动技术的进步。

  ### 联系我

  如果你对我的工作感兴趣，或者有任何技术问题想要讨论，欢迎通过页面下方的联系方式与我交流！
