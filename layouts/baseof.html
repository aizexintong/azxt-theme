<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="anime-bg">
  <!-- 粒子背景 -->
  <canvas id="particles-canvas"></canvas>
  
  <header>
    {{ partial "header.html" . }}
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    {{ partial "footer.html" . }}
  </footer>
  
  <!-- 搜索弹窗 -->
  {{ partial "search-modal.html" . }}
  
  <!-- 粒子特效脚本 -->
  <script src="{{ "js/particles.js" | relURL }}"></script>
</body>
</html>
