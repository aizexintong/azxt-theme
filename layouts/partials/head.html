<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="{{ .Site.Params.description | default "爱则心痛的个人博客" }}">
<meta name="author" content="{{ .Site.Params.author | default "爱则心痛" }}">
<meta name="keywords" content="技术博客,编程,开发,JavaScript,Python,Flutter,Rust">

<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ printf "%s | %s" .Title site.Title }}{{ end }}</title>

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="{{ "/favicon.svg" | relURL }}">

<!-- 第三方库 CDN优先，本地回退 -->
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" crossorigin="anonymous">
<link rel="stylesheet" href="{{ "lib/fonts/fonts.css" | relURL }}">

{{/* CDN CSS 回退到本地 */}}
<script>
(function(){
  setTimeout(function(){
    var t=document.createElement('i');
    t.className='fas fa-square';
    t.style.cssText='position:fixed;left:-99px;top:-99px;font-size:16px;';
    document.body.appendChild(t);
    if(t.offsetWidth<5){var l=document.createElement('link');l.rel='stylesheet';l.href='{{ "lib/fontawesome/css/all.min.css" | relURL }}';document.head.appendChild(l);}
    document.body.removeChild(t);
  },2500);
})();
</script>

<!-- Open Graph -->
{{- $assets := hugo.Data.assets -}}
{{- $avatar := $assets.avatar.url | default "https://t.alcy.cc/tx" -}}
<meta property="og:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta property="og:description" content="{{ .Description | default .Site.Params.description }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:image" content="{{ $avatar }}">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta name="twitter:description" content="{{ .Description | default .Site.Params.description }}">
<meta name="twitter:image" content="{{ $avatar }}">

<!-- RSS -->
<link rel="alternate" type="application/rss+xml" title="{{ site.Title }} RSS" href="{{ "index.xml" | relURL }}">

<!-- 自定义样式 -->
{{ partial "head/css.html" . }}

<!-- 自定义脚本 -->
{{ partial "head/js.html" . }}

<!-- 结构化数据 -->
{{ if .Site.Params.enableSchema }}
  {{ partial "head/schema.html" . }}
{{ end }}
