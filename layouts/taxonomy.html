{{ define "main" }}
  <div class="section-content" role="main">
    <header class="section-header">
      <h1 class="section-title">
        <i class="fas fa-tags" style="margin-right: 0.5rem; color: var(--primary);"></i>标签云
      </h1>
      <p class="section-subtitle">探索不同主题的文章</p>
    </header>

    <div class="container">
      <div class="tags-cloud-container">
        {{ range .Pages }}
          {{ $count := len .Pages }}
          {{ $size := 1.0 }}
          {{ if gt $count 10 }}
            {{ $size = 1.3 }}
          {{ else if gt $count 5 }}
            {{ $size = 1.15 }}
          {{ else if gt $count 2 }}
            {{ $size = 1.05 }}
          {{ end }}
          <a href="{{ .RelPermalink }}" class="tag-cloud-item" style="font-size: {{ $size }}rem;" aria-label="标签: {{ .LinkTitle }} ({{ $count }}篇文章)">
            <i class="fas fa-hashtag"></i>
            {{ .LinkTitle }}
            <span class="tag-count-badge">{{ $count }}</span>
          </a>
        {{ end }}
      </div>
    </div>
  </div>
{{ end }}
